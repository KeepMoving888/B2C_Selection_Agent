# ============================================================
# .github/workflows/ci.yml — B2C 选品系统持续集成
#
# 触发条件：push / pull_request 到 main 分支
# 执行内容：
#   1. 敏感信息扫描 + 敏感词检查
#   2. Python 代码风格检查（ruff）
#   3. 单元测试（不依赖外部 API / GPU）
#   4. API Gateway Docker 镜像自动构建
# ============================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ------------------------------------------------------------------
  # Job 1: 敏感信息 / 敏感词检查
  # ------------------------------------------------------------------
  sensitive-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan secrets with TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --only-verified

      - name: Check commit messages for sensitive words
        run: |
          output=$(git log --oneline --all \
            --grep='面试\|模拟\|Mock\|mock\|演示\|interview\|demo\|resume\|简历\|求职' \
            --format='%H %s' || true)
          if [ -n "$output" ]; then
            echo "ERROR: Sensitive words found in commit history:"
            echo "$output"
            exit 1
          fi
          echo "OK: No sensitive words in commit messages."

      - name: Check README and frontend for sensitive words
        run: |
          output=$(grep -inE '面试|模拟|Mock|mock|演示|interview|demo|resume|简历|求职' \
            README.md frontend/app.py || true)
          if [ -n "$output" ]; then
            echo "ERROR: Sensitive words found in tracked files:"
            echo "$output"
            exit 1
          fi
          echo "OK: No sensitive words in README.md / frontend/app.py."

  # ------------------------------------------------------------------
  # Job 2: 代码风格检查
  # ------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint with Ruff
        uses: chartboost/ruff-action@v1
        with:
          src: "./"
          args: "check ."

  # ------------------------------------------------------------------
  # Job 3: 单元测试
  # ------------------------------------------------------------------
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run unit tests
        run: |
          pytest tests/ -v

  # ------------------------------------------------------------------
  # Job 4: API Gateway Docker 镜像自动构建
  # ------------------------------------------------------------------
  # 说明：
  #   - 本 job 会在每次 push 时验证 Gateway 镜像可以成功构建。
  #   - 如需自动推送到 Docker Hub / GitHub Container Registry，
  #     请在仓库 Settings -> Secrets and variables -> Actions 中配置：
  #       DOCKER_USERNAME
  #       DOCKER_PASSWORD
  #     然后取消下面 "Login to Docker Hub" 和 "Push image" 步骤的注释。
  # ------------------------------------------------------------------
  docker-build:
    runs-on: ubuntu-latest
    needs: [sensitive-check, lint, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Gateway image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deploy/Dockerfile.gateway
          push: false
          tags: |
            b2c-product-selection-gateway:latest
            b2c-product-selection-gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # - name: Login to Docker Hub
      #   if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKER_USERNAME }}
      #     password: ${{ secrets.DOCKER_PASSWORD }}

      # - name: Push image to Docker Hub
      #   if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      #   uses: docker/build-push-action@v5
      #   with:
      #     context: .
      #     file: ./deploy/Dockerfile.gateway
      #     push: true
      #     tags: |
      #       ${{ secrets.DOCKER_USERNAME }}/b2c-product-selection-gateway:latest
      #       ${{ secrets.DOCKER_USERNAME }}/b2c-product-selection-gateway:${{ github.sha }}
