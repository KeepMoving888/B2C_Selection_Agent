version: '3.8'

# 说明：
#   本 Compose 面向 WSL2 / Linux 生产环境。若在 Windows Docker Desktop 使用，
#   请将卷映射中的 /mnt/e/models/... 替换为 E:/models/...
services:
  # 领域微调合并模型（主推理实例，优先使用 FP16）
  vllm-qwen-ecommerce:
    image: vllm/vllm-openai:latest
    container_name: qwen2.5-7b-ecommerce
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      - /mnt/e/models/qwen2.5-7b-ecommerce-merged:/models/qwen2.5-7b:ro
      - ../hf_cache:/root/.cache/huggingface
    command: >
      --model /models/qwen2.5-7b
      --max-model-len 4096
      --gpu-memory-utilization 0.85
      --max-num-seqs 8
      --port 8000
      --host 0.0.0.0
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # AWQ INT4 量化实例（显存受限时 fallback）
  vllm-qwen-base:
    image: vllm/vllm-openai:latest
    container_name: qwen2.5-7b-base
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      - /mnt/e/models/qwen2.5-7b-ecommerce-awq-v3:/models/qwen2.5-7b-base:ro
      - ../hf_cache:/root/.cache/huggingface
    command: >
      --model /models/qwen2.5-7b-base
      --quantization awq
      --max-model-len 4096
      --gpu-memory-utilization 0.85
      --max-num-seqs 8
      --port 8001
      --host 0.0.0.0
    ports:
      - "8001:8001"
    restart: unless-stopped

  # API Gateway + 模型路由
  api-gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.gateway
    container_name: agent-api-gateway
    environment:
      - VLLM_AWQ_URL=http://vllm-qwen-base:8001
      - VLLM_FP16_URL=http://vllm-qwen-ecommerce:8000
      - GATEWAY_PORT=8080
      # - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    ports:
      - "8080:8080"
    depends_on:
      - vllm-qwen-ecommerce
      - vllm-qwen-base
    restart: unless-stopped

  # Prometheus 监控
  prometheus:
    image: prom/prometheus:latest
    container_name: agent-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  # Grafana 可视化看板
  grafana:
    image: grafana/grafana:latest
    container_name: agent-grafana
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
