# ============================================================
# monitoring/prometheus.yml
# ============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: "agent-app"
    static_configs:
      - targets: ["agent-app:8080"]
    metrics_path: "/metrics"
    scrape_interval: 10s

  - job_name: "vllm"
    static_configs:
      - targets: ["vllm-ecommerce:8000"]
