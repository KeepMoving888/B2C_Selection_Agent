[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
filterwarnings =
    ignore::DeprecationWarning:pytest_asyncio.plugin
    ignore::pytest.PytestDeprecationWarning
    ignore:urllib3 .* doesn't match a supported version:UserWarning
    ignore:urllib3 .* doesn't match a supported version:Warning
